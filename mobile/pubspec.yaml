version: 0.1.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^8.3.1
  flutter_riverpod: ^3.3.2
  flutter_secure_storage: ^10.3.1
