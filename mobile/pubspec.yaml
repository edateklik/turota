name: turota_mobile
description: "Turota mobile application."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.3

dependencies:
  clipboard: ^3.0.14
  flutter:
    sdk: flutter
  flutter_map: ^8.3.1
  flutter_riverpod: ^3.3.2
  flutter_secure_storage: ^10.3.1
  go_router: ^17.3.0
  http: ^1.6.0
  http_parser: ^4.1.2
  image_cropper: ^12.2.1
  image_picker: ^1.2.3
  latlong2: ^0.10.1
  mobile_scanner: ^7.4.0
  path_provider: ^2.1.6
  shared_preferences: ^2.5.5
  signalr_netcore: ^1.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/categories/
