services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_DB: rota
      POSTGRES_USER: rota
      POSTGRES_PASSWORD: rota_dev_password
    ports:
      - "5432:5432"
    volumes:
      - rota_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rota -d rota"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  rota_postgres_data:
