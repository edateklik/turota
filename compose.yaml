services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_DB: rota
      POSTGRES_USER: rota
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    ports:
      - "5432:5432"
    volumes:
      - rota_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rota -d rota"]
      interval: 5s
      timeout: 3s
      retries: 10

  ai-recommendation:
    build:
      context: ./ai-service
      target: runtime
    environment:
      DATABASE_URL: postgresql://rota:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/rota
      SERVICE_API_KEY: ${FASTAPI_SERVICE_KEY:?FASTAPI_SERVICE_KEY must be set in .env}
      CATALOG_CACHE_SECONDS: 30
      MODEL_VERSION: content-based-xai-v1
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/Rota.Api/Dockerfile
      target: runtime
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__DiscoveryDb: Host=postgres;Port=5432;Database=rota;Username=rota;Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env};Pooling=true;Maximum Pool Size=100
      ConnectionStrings__IdentityDb: Host=postgres;Port=5432;Database=rota;Username=rota;Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env};Pooling=true;Maximum Pool Size=100
      ConnectionStrings__RecommendationDb: Host=postgres;Port=5432;Database=rota;Username=rota;Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env};Pooling=true;Maximum Pool Size=100
      ConnectionStrings__TripDb: Host=postgres;Port=5432;Database=rota;Username=rota;Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env};Pooling=true;Maximum Pool Size=100
      ConnectionStrings__AdministrationReadDb: Host=postgres;Port=5432;Database=rota;Username=rota;Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env};Pooling=true;Maximum Pool Size=20
      FastApi__BaseUrl: http://ai-recommendation:8000
      FastApi__RecommendationPath: /api/v1/recommendations/generate
      FastApi__TimeoutMilliseconds: 1500
      FastApi__ServiceApiKey: ${FASTAPI_SERVICE_KEY:?FASTAPI_SERVICE_KEY must be set in .env}
      Jwt__Issuer: Rota.Api
      Jwt__Audience: Rota.Clients
      Jwt__SigningKey: ${JWT_SIGNING_KEY:?JWT_SIGNING_KEY must be set in .env}
      Jwt__ExpirationMinutes: 60
      AdminBootstrap__Enabled: "true"
      AdminBootstrap__Email: ${ROTA_ADMIN_EMAIL:-admin@rota.local}
      AdminBootstrap__Password: ${ROTA_ADMIN_PASSWORD:?ROTA_ADMIN_PASSWORD must be set in .env}
      AdminBootstrap__FirstName: Rota
      AdminBootstrap__LastName: Admin
      Database__ApplyMigrationsOnStartup: "true"
      Cors__AllowedOrigins__0: http://localhost:3000
      Cors__AllowedOrigins__1: http://localhost:5173
    ports:
      - "5121:8080"
    volumes:
      - rota_api_data_protection_keys:/home/app/.aspnet/DataProtection-Keys
    depends_on:
      postgres:
        condition: service_healthy
      ai-recommendation:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

volumes:
  rota_postgres_data:
  rota_api_data_protection_keys:
